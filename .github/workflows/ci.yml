name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - name: Build
        run: |
          xcodebuild build \
            -scheme UrbanMobilityExplorer \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -quiet
      - name: Test
        run: |
          xcodebuild test \
            -scheme UrbanMobilityExplorer \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -quiet
